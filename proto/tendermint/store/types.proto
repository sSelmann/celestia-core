syntax = "proto3";
package tendermint.store;

option go_package = "github.com/cometbft/cometbft/proto/tendermint/store";

message BlockStoreState {
  int64 base   = 1;
  int64 height = 2;
}

// TxInfo describes the location of a tx inside a committed block
// as well as the result of executing the transaction and the error log output.
message TxInfo {
  int64  height = 1;
  uint32 index  = 2;
  // The response code of executing the tx. 0 means
  // successfully executed, all others are error codes.
  uint32 code = 3;
  // The error log output generated if the transaction execution fails.
  string error = 4;
}

// ProposerRoundInfo tracks which validator was the proposer for each round
// and whether they successfully proposed or timed out.
message ProposerRoundInfo {
  int64  height           = 1;
  int32  round            = 2;
  bytes  proposer_address = 3;
  bool   proposed         = 4; // true if successfully proposed, false if timed out
}

// BlockProposerInfo stores all proposer information for a specific block height
message BlockProposerInfo {
  int64                        height = 1;
  repeated ProposerRoundInfo   rounds = 2;
}